            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            cursor: pointer;

            font-weight: 600;
            color: #0f344d;
            letter-spacing: 0px;

            color: #436684;
            font-size: 1.1rem;
            margin-left: auto;
            font-style: italic;
        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));

            background: #e9eef4;
            padding: 1px;
        }

            background: white;
            padding: 22px 10px;

            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: 0.15s;
            border: 1px solid transparent;

                name: "双人旁",
                meaning: "harakat, yo‘l",
                cards: [
                    { hanzi: "很", pinyin: "hěn", meaning: "juda" },
                    { hanzi: "得", pinyin: "de", meaning: "yordamchi; olmoq" },
                    { hanzi: "行", pinyin: "xíng", meaning: "bormoq, yaxshi" }
                ]
            }
        ];

        // ---------- DOM elementlari ----------
        const container = document.getElementById('radicalGroups');
        const groupFilterDiv = document.getElementById('groupFilters');
        const searchInput = document.getElementById('searchInput');
        const statsSpan = document.getElementById('stats');

        let activeGroup = 'all';
        let searchTerm = '';

        // guruh tugmalarini yaratish (radikal nomlari)
        function renderFilterButtons() {
            const allGroups = groups.map(g => ({ radical: g.radical, name: g.name }));
            let html = `<button class="group-btn active" data-group="all">Hammasi</button>`;
            groups.forEach(g => {
                html += `<button class="group-btn" data-group="${g.radical}">${g.radical} ${g.name}</button>`;
            });
            groupFilterDiv.innerHTML = html;

            document.querySelectorAll('.group-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeGroup = btn.dataset.group;
                    filterAndRender();
                });
            });
        }

        // filtrlash va kartalarni chizish
        function filterAndRender() {
            const term = searchTerm.trim().toLowerCase();

            // har bir guruhni filterdan o‘tkazamiz
            let filteredGroups = groups.map(group => {
                // guruhdagi cardlarni filterla (search bo‘yicha)
                const matchedCards = group.cards.filter(card =>
                    card.hanzi.includes(term) ||
                    card.pinyin.toLowerCase().includes(term) ||
                    card.meaning.toLowerCase().includes(term)
                );
                return { ...group, matchedCards };
            }).filter(group => {
                // guruhni ko‘rsatish kerakmi?
                if (activeGroup !== 'all' && group.radical !== activeGroup) return false;
                if (term !== '' && group.matchedCards.length === 0) return false;
                return true;
            });

            // statistika
            let totalCards = 0;
            filteredGroups.forEach(g => totalCards += g.matchedCards?.length || g.cards.length);
            statsSpan.innerText = totalCards + ' ta';

            // html yaratish
            let html = '';
            filteredGroups.forEach(group => {
                const displayCards = term ? group.matchedCards : group.cards;
                if (displayCards.length === 0 && term !== '') return; // bu groupda mos keladigan card yo‘q

                html += `<div class="group-card">`;
                html += `<div class="group-header">`;
                html += `<h2>${group.radical} ${group.name}</h2>`;
                html += `<span class="group-badge">${displayCards.length} ta</span>`;
                html += `<span class="group-meaning">${group.meaning}</span>`;
                html += `</div>`;
                html += `<div class="card-container">`;

                displayCards.forEach(card => {
                    html += `<div class="flashcard">`;
                    html += `<div class="hanzi">${card.hanzi}</div>`;
                    html += `<div class="pinyin">${card.pinyin}</div>`;
                    html += `<div class="meaning">${card.meaning}</div>`;
                    html += `</div>`;
                });

                html += `</div></div>`;
            });

            if (filteredGroups.length === 0) {
                html = `<div class="group-card"><div class="card-container"><div class="no-match">😕 Hech narsa topilmadi</div></div></div>`;
            }

            container.innerHTML = html;
        }

        // qidiruv hodisasi
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            filterAndRender();
        });

        // reset tugmasi (optional) – biz filterda "Hammasi" tugmasiga bosing
        // init
        renderFilterButtons();
        filterAndRender();

        // guruh sarlavhasini bosib yig‘ish / ochish (accordion) – qo‘shimcha qulaylik
        container.addEventListener('click', (e) => {
            const header = e.target.closest('.group-header');
            if (!header) return;
            const containerDiv = header.parentElement.querySelector('.card-container');
            if (containerDiv) {
                containerDiv.style.display = containerDiv.style.display === 'none' ? 'grid' : 'none';
            }
        });

    })();
</script>
</body>
</html>
