            justify-content: space-between;

            gap: 15px;
            border-bottom: 2px solid #dce9f5;
        }
        .lesson-title {
            display: flex;
            align-items: baseline;
            gap: 15px;
            flex-wrap: wrap;
        }
        .lesson-num {
            background: #1e6f8f;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.4rem;
        }
        .lesson-name {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1d4e6e;
        }

            background: #e3effa;
            padding: 6px 20px;
            border-radius: 40px;
            color: #1a5d7a;
            font-weight: 500;
        }
        .table-wrapper {
            padding: 0;
            overflow-x: auto;
        }
        .word-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        .word-table th {
            background: #eef4fc;
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            color: #1c5777;
            border-bottom: 2px solid #cde0ef;
        }
        .word-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #e6edf4;
            vertical-align: top;
        }
        .word-table tr:hover td {
            background: #f8fbfe;
        }

            font-size: 1.3rem;
            font-weight: 500;
            color: #003056;

    // Render qilish
    function renderLessons(filter = "") {
        const container = document.getElementById("lessonsGrid");
        let html = "";
        const term = filter.trim().toLowerCase();

        lessonsData.forEach(lesson => {
            // So'zlarni filtrlash (qidiruv bo'yicha)
            let filteredWords = lesson.words;
            let filteredProper = lesson.proper ? [...lesson.proper] : [];
            
            if (term !== "") {
                filteredWords = lesson.words.filter(w => 
                    w.hanzi.includes(term) || 
                    w.pinyin.toLowerCase().includes(term) || 
                    w.en.toLowerCase().includes(term) || 
                    w.uz.toLowerCase().includes(term)
                );
                if (lesson.proper) {
                    filteredProper = lesson.proper.filter(p => 
                        p.hanzi.includes(term) || 
                        p.pinyin.toLowerCase().includes(term) || 
                        p.en.toLowerCase().includes(term) || 
                        p.uz.toLowerCase().includes(term)
                    );
                }
                if (filteredWords.length === 0 && filteredProper.length === 0) return;
            }

            // Dars kartasini yaratish
            html += `<div class="lesson-card" data-lesson="${lesson.lesson}">`;
            html += `<div class="lesson-header" onclick="toggleLesson(this)">`;
            html += `<div class="lesson-title">`;
            html += `<span class="lesson-num">${lesson.lesson}</span>`;
            html += `<span class="lesson-name">${lesson.title}</span>`;
            html += `</div>`;
            html += `<div class="word-count">📖 ${filteredWords.length + filteredProper.length} ta so‘z</div>`;
            html += `<span class="toggle-icon">▼</span>`;
            html += `</div>`;
            
            html += `<div class="table-wrapper hidden-content">`;
            html += `<table class="word-table">`;
            html += `<thead><tr><th>汉字</th><th>Pinyin</th><th>English</th><th>O‘zbekcha</th></tr></thead><tbody>`;
            
            filteredWords.forEach(w => {
                html += `<tr>`;
                html += `<td class="hanzi">${w.hanzi}</td>`;
                html += `<td class="pinyin">${w.pinyin}</td>`;
                html += `<td class="en">${w.en}</td>`;
                html += `<td class="uz">${w.uz}</td>`;
                html += `</tr>`;
            });
            
            if (filteredProper.length > 0) {
                filteredProper.forEach(p => {
                    html += `<tr style="background:#fef9e6;">`;
                    html += `<td class="hanzi">${p.hanzi} 🏛️</td>`;
                    html += `<td class="pinyin">${p.pinyin}</td>`;
                    html += `<td class="en">${p.en}</td>`;
                    html += `<td class="uz">${p.uz}</td>`;
                    html += `</tr>`;
                });
            }
            
            html += `</tbody></table>`;
            html += `</div></div>`;
        });
        
        if (html === "") {
            html = `<div style="text-align:center; padding:60px; background:white; border-radius:40px;">🔍 Hech narsa topilmadi. Iltimos, boshqa so‘z bilan qidiring.</div>`;
        }
        container.innerHTML = html;
    }

    function toggleLesson(header) {
        const wrapper = header.nextElementSibling;
        const icon = header.querySelector('.toggle-icon');
        if (wrapper.classList.contains('hidden-content')) {
            wrapper.classList.remove('hidden-content');
            icon.innerHTML = '▲';
            icon.style.transform = 'rotate(0deg)';
        } else {
            wrapper.classList.add('hidden-content');
            icon.innerHTML = '▼';
        }
    }

    function filterLessons() {
        const input = document.getElementById("searchInput");
        renderLessons(input.value);
    }

    // Boshlang'ich render
    renderLessons("");
</script>
