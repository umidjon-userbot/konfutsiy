<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body { font-family:Arial; margin:0; }
.header {
  background:#111;
  color:white;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
}
button {
  padding:6px 10px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:5px;
  cursor:pointer;
}
#generateBtn:disabled {
  background:gray;
  cursor:not-allowed;
}
.section {
  padding:20px;
}
</style>
</head>
<body>

<div class="header">
  <span id="userInfo"></span>
  <button onclick="logout()">Logout</button>
</div>

<div class="section" id="mainSection">
  <h2>Asosiy Flashcard Menu 🚀</h2>
  <button id="generateBtn">Generate</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "SIZNING_API_KEY",
  authDomain: "wuminjun-f4d97.firebaseapp.com",
  projectId: "wuminjun-f4d97",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const generateBtn = document.getElementById("generateBtn");

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("userInfo").innerText = "👤 " + user.displayName;
    generateBtn.disabled = false;

    // ✅ Avtomatik scroll
    document.getElementById("mainSection").scrollIntoView({
      behavior: "smooth"
    });

  } else {
    window.location.href = "index.html";
  }
});

window.logout = function() {
  signOut(auth).then(() => {
    localStorage.removeItem("flashUser");
    window.location.href = "index.html";
  });
};

// 4️⃣ Login bo'lmasa Generate bosilmaydi
generateBtn.disabled = true;
</script>

</body>
</html>
