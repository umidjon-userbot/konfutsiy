<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Dashboard</title>
<style>
body{margin:0;font-family:Arial;background:#f3f4f6;}
.header{
  background:#111;
  color:white;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.main{padding:30px;}
h2{margin-bottom:20px;}

/* Button styles */
.btn{
  padding:12px 24px;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  margin:8px;
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.btn:hover{opacity:.9;transform:translateY(-2px);}
.btn-primary{background:#2563eb;}
.btn-success{background:#10b981;}
.btn-danger{background:#ef4444;}
.btn-purple{background:#8b5cf6;}

/* Cards grid */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:20px;
  margin-top:30px;
}
.card{
  background:white;
  border-radius:12px;
  padding:24px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.card h3{margin:0 0 10px 0;}
.card p{color:#666;margin:0 0 15px 0;}
.card-icon{font-size:32px;margin-bottom:10px;}
</style>
</head>
<body>

<div class="header">
  <span id="userInfo">Yuklanmoqda...</span>
  <button class="btn btn-danger" onclick="logout()">Logout</button>
</div>

<div class="main">
  <h2>Asosiy Flashcard Menu 🚀</h2>
  <p>Xush kelibsiz! Quyidagi bo'limlardan birini tanlang:</p>

  <div class="cards">
    
    <div class="card">
      <div class="card-icon">📚</div>
      <h3>Flashcard Generator</h3>
      <p>So'zlarni qidiring, tanlang va flashcard yarating</p>
      <button class="btn btn-primary" onclick="openApp()">Ochish</button>
    </div>

    <div class="card">
      <div class="card-icon">🔀</div>
      <h3>HSK Shuffle</h3>
      <p>HSK 1-6 so'zlarini shuffle qilib flashcard yarating</p>
      <button class="btn btn-success" onclick="openShuffle()">Ochish</button>
    </div>

  </div>
</div>

<script type="module">
import { requireAuth, logout, setUserInfo } from "./auth.js";

// Auth tekshirish
requireAuth("index.html");
setUserInfo("userInfo");

// Global funksiyalar
window.logout = logout;

window.openApp = () => {
  window.location.href = "index-2.html";
};

window.openShuffle = () => {
  window.location.href = "flashcard-shuffle.html";
};
</script>

</body>
</html>
