<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">
<style>
@media print {
  .no-print { display: none !important; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    width: 210mm; 
    height: 297mm; 
    margin: 0; 
    padding: 0;
  }
  #appSection { padding: 0; margin: 0; }
  #printArea { padding: 0; margin: 0; }
  .page {
    page-break-after: always;
    page-break-inside: avoid;
    width: 210mm;
    height: 287mm;
    margin: 5mm 0;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 0;
  }
  .card {
    border: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    text-align: center;
    padding: 2px;
    overflow: hidden;
    height: 100%;
  }
  .card.back {
    font-size: 12px;
    flex-direction: column;
    line-height: 1.3;
  }
  .card.back .pinyin {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 2px;
  }
}

@page {
  size: A4 portrait;
  margin: 0;
}
</style>
</head>
<body>
<div class="header-bar no-print">
  <h2>Flashcard 吴敏俊</h2>
  <div id="ledClock" class="led-clock"></div>
</div>
<div id="appSection">
  <!-- MODE SWITCH -->
  <div class="mode-switch no-print">
    <label>
      <input type="radio" name="mode" value="selected" checked>
      Tanlangan flashcardlar
    </label>
    <label>
      <input type="radio" name="mode" value="random">
      HSK bo'yicha random
    </label>
  </div>
  <!-- SEARCH -->
  <div class="no-print search-box">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="Hanzi yoki pinyin yozing..."
      autocomplete="off"
    />
    <div id="liveResults"></div>
  </div>
  <!-- SELECTED COUNTER -->
  <div class="no-print selected-info">
    Tanlangan: <span id="selectedCount">0</span>
  </div>
  <!-- SELECTED LIST -->
  <div id="selectedList" class="no-print"></div>
  <!-- CONTROLS -->
  <div class="controls no-print">
    <select id="levelSelect">
      <option value="1">HSK1</option>
      <option value="2">HSK2</option>
      <option value="3">HSK3</option>
      <option value="4">HSK4</option>
      <option value="5">HSK5</option>
      <option value="6">HSK6</option>
    </select>
    <select id="countSelect">
      <option value="25">25</option>
      <option value="50">50</option>
      <option value="75">75</option>
      <option value="100">100</option>
    </select>
    <button onclick="generatePrint()">Generate</button>
    <button onclick="window.print()">Print / Save PDF</button>
  </div>
  <p class="no-print" style="color:#666; font-size:12px; margin:8px 0;">
    💡 PDF saqlash uchun: Print bosing → "Save as PDF" tanlang
  </p>
  <!-- PRINT AREA -->
  <div id="printArea"></div>
</div>
<script src="app.js"></script>
</body>
</html>
