<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Login</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  font-family:Arial;
  color:white;
}
.box{
  text-align:center;
}
button{
  padding:10px 20px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin-top:15px;
}
button:hover{opacity:.9;}
</style>
</head>
<body>

<div class="box">
  <h2>Flashcard tizimi</h2>
  <p id="status">Tekshirilmoqda...</p>
  <button onclick="login()">Google Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBT1H17hj0xNHQScoBmJkdiuAlzy0qk1uY",
  authDomain: "wuminjun-f4d97.firebaseapp.com",
  projectId: "wuminjun-f4d97",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.login = () => {
  signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.replace("dashboard.html");
  } else {
    document.getElementById("status").innerText = "Login qilinmagan";
  }
});
</script>

</body>
</html>
