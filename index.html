<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Login</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#111,#1e3a8a);
  font-family:Arial, sans-serif;
  color:white;
}

.card{
  background:#1f2937;
  padding:40px;
  border-radius:12px;
  text-align:center;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,.4);
}

h2{
  margin-bottom:15px;
}

p{
  font-size:14px;
  opacity:.8;
}

button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  font-size:14px;
}

button:hover{
  opacity:.9;
}
</style>
</head>

<body>

<div class="card">
  <h2>Flashcard tizimi</h2>
  <p id="status">Login qilish uchun Google tugmasini bosing</p>
  <button onclick="login()">Google orqali kirish</button>
</div>

<script type="module">
import { login, redirectIfLoggedIn } from "./auth.js";

// Login tugmasi
window.login = login;

// Agar allaqachon login qilingan bo‘lsa,
// avtomatik dashboardga o'tadi
redirectIfLoggedIn("dashboard.html");
</script>

</body>
</html>
