
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard GitHub Edition</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{font-family:Arial;margin:20px}
button{margin:5px;padding:8px}
.hidden{display:none}
.card{border:1px solid #000;padding:10px;margin:5px}
</style>
</head>
<body>

<h2>Flashcard App (GitHub Static)</h2>

<div id="loginStatus">Checking Telegram...</div>

<div id="main" class="hidden">

<h3>Create Flashcard</h3>
<input id="hanzi" placeholder="Hanzi">
<input id="pinyin" placeholder="Pinyin">
<input id="english" placeholder="English">
<button onclick="addCard()">Add</button>

<h3>Your Cards</h3>
<div id="cards"></div>

<h3>Progress</h3>
<div id="progress"></div>

<button onclick="openAdmin()">Admin Panel</button>

</div>

<div id="admin" class="hidden">
<h3>Admin Panel</h3>
<div id="userList"></div>
<button onclick="closeAdmin()">Close</button>
</div>

<script src="app.js"></script>
</body>
</html>
