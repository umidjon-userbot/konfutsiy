<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">
<style>
@media print {
  .no-print { display: none !important; }
  body { margin: 0; padding: 0; }
  .page {
    page-break-after: always;
    width: 210mm;
    height: 297mm;
    margin: 0;
    padding: 8mm;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
  }
  .card {
    border: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    text-align: center;
    padding: 4px;
  }
  .card.back {
    font-size: 14px;
    flex-direction: column;
  }
  .card.back .pinyin {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 4px;
  }
}
</style>
</head>
<body>
<div class="header-bar no-print">
  <h2>Flashcard 吴敏俊</h2>
  <div id="ledClock" class="led-clock"></div>
</div>
<div id="appSection">
  <!-- MODE SWITCH -->
  <div class="mode-switch no-print">
    <label>
      <input type="radio" name="mode" value="selected" checked>
      Tanlangan flashcardlar
    </label>
    <label>
      <input type="radio" name="mode" value="random">
      HSK bo'yicha random
    </label>
  </div>
  <!-- SEARCH -->
  <div class="no-print search-box">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="Hanzi yoki pinyin yozing..."
      autocomplete="off"
    />
  </div>
  <div id="liveResults"></div>
  <!-- SELECTED COUNTER -->
  <div class="no-print selected-info">
    Tanlangan: <span id="selectedCount">0</span>
  </div>
  <!-- SELECTED LIST -->
  <div id="selectedList" class="no-print"></div>
  <!-- CONTROLS -->
  <div class="controls no-print">
    <select id="levelSelect">
      <option value="1">HSK1</option>
      <option value="2">HSK2</option>
      <option value="3">HSK3</option>
      <option value="4">HSK4</option>
      <option value="5">HSK5</option>
      <option value="6">HSK6</option>
    </select>
    <select id="countSelect">
      <option value="25">25</option>
      <option value="50">50</option>
      <option value="75">75</option>
      <option value="100">100</option>
    </select>
    <button onclick="generatePrint()">Generate</button>
    <button onclick="window.print()">Print / Save PDF</button>
  </div>
  <p class="no-print" style="color:#666; font-size:12px; margin:8px 0;">
    💡 PDF saqlash uchun: Print bosing → "Save as PDF" tanlang
  </p>
  <!-- PRINT AREA -->
  <div id="printArea"></div>
</div>
<script src="app.js"></script>
</body>
</html>
