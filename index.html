<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Production</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2 class="no-print">Flashcard Production Build</h2>

<div class="controls no-print">
  <select id="levelSelect"></select>
  <select id="countSelect">
    <option value="25">25</option>
    <option value="50">50</option>
    <option value="100">100</option>
  </select>
  <button onclick="shuffleLevel()">Shuffle</button>
  <button onclick="downloadPDF()">Download PDF</button>
  <button onclick="printCards()">Print</button>
</div>

<div id="card" class="card no-print" onclick="flipCard()"></div>
<button class="no-print" onclick="nextCard()">Next</button>

<div id="printArea"></div>

<script src="app.js"></script>
</body>
</html>
