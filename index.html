<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<link rel="icon" href="favicon.ico">
<body>

<div class="header-bar no-print">
  <h2>Flashcard 吴敏俊</h2>
  <div id="liveClock" class="led-clock"></div>
</div>

<div id="appSection">

  <!-- MODE SWITCH -->
  <div class="mode-switch no-print">
    <label>
      <input type="radio" name="mode" value="selected" checked>
      Tanlangan flashcardlar
    </label>

    <label>
      <input type="radio" name="mode" value="random">
      HSK bo‘yicha random
    </label>
  </div>

  <!-- SEARCH -->
  <div class="no-print search-box">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="Hanzi yoki pinyin yozing..."
      autocomplete="off"
    />
  </div>

  <div id="searchResult"></div>

  <!-- SELECTED COUNTER -->
  <div class="no-print selected-info">
    Tanlangan: <span id="selectedCount">0</span>
  </div>

  <!-- SELECTED LIST -->
  <div id="selectedList" class="no-print"></div>

  <!-- CONTROLS -->
  <div class="controls no-print">
    <select id="levelSelect">
      <option value="1">HSK1</option>
      <option value="2">HSK2</option>
      <option value="3">HSK3</option>
      <option value="4">HSK4</option>
      <option value="5">HSK5</option>
      <option value="6">HSK6</option>
    </select>

    <select id="countSelect">
      <option value="25">25</option>
      <option value="50">50</option>
      <option value="75">75</option>
      <option value="100">100</option>
    </select>

    <button onclick="generatePrint()">Random/Generate</button>
    <button onclick="window.print()">Print</button>
    <button onclick="downloadPDF()">Download PDF</button>
  </div>

  <!-- PRINT AREA -->
  <div id="printArea"></div>

</div>

<script src="app.js"></script>

</body>
</html>
