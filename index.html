<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK Flashcard Ultra Print</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2 class="no-print">HSK Flashcards Ultra</h2>

<div class="no-print controls">
  <select id="levelSelect">
    <option value="1">HSK1</option>
    <option value="2">HSK2</option>
    <option value="3">HSK3</option>
    <option value="4">HSK4</option>
    <option value="5">HSK5</option>
    <option value="6">HSK6</option>
  </select>

  <select id="countSelect">
    <option value="25">25</option>
    <option value="50">50</option>
    <option value="100">100</option>
  </select>

  <button onclick="shuffleLevel()">Shuffle</button>
  <button onclick="printCards()">Print</button>
</div>

<div id="preview" class="no-print"></div>
<div id="printArea"></div>

<script src="app.js"></script>
</body>
</html>
