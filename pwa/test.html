<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK Mini Test</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.ico">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  color: white;
}

/* Header */
.header {
  background: rgba(0,0,0,0.3);
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(10px);
}

.header h2 {
  margin: 0;
  font-size: 20px;
}

.header h2 span {
  color: #00ff88;
}

.btn-back {
  padding: 8px 16px;
  background: #ef4444;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  text-decoration: none;
}

.btn-back:hover {
  background: #dc2626;
}

/* Offline indicator */
.offline-badge {
  display: none;
  background: #f59e0b;
  color: #000;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: bold;
}

body.offline .offline-badge {
  display: inline-block;
}

/* Container */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
}

/* Controls */
.controls {
  background: rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
}

.control-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 12px;
}

.control-row:last-child {
  margin-bottom: 0;
}

.control-row label {
  font-weight: bold;
  min-width: 80px;
  color: #ccc;
  font-size: 14px;
}

select {
  flex: 1;
  padding: 10px 15px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.9);
  color: #333;
  cursor: pointer;
  outline: none;
}

.btn-start {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
  background: linear-gradient(135deg, #00ff88, #00cc6a);
  color: #1a1a2e;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

.btn-start:hover {
  transform: scale(1.02);
}

/* Quiz */
#quiz {
  display: none;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 25px 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}

#quiz.active {
  display: block;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Score */
.score-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 15px;
  font-size: 16px;
}

.score-item {
  background: rgba(255,255,255,0.1);
  padding: 8px 20px;
  border-radius: 20px;
}

.score-item.correct { color: #00ff88; }
.score-item.wrong { color: #ff6b6b; }

/* Question */
#question {
  font-size: 60px;
  font-weight: bold;
  margin: 15px 0 25px 0;
  text-shadow: 0 4px 15px rgba(0,255,136,0.3);
  word-break: break-word;
}

/* Options */
#options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.option-btn {
  padding: 15px 10px;
  font-size: 18px;
  background: rgba(255,255,255,0.1);
  color: white;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  word-break: break-word;
}

.option-btn:hover {
  background: rgba(255,255,255,0.2);
  border-color: #00ff88;
}

.option-btn.correct {
  background: #10b981;
  border-color: #10b981;
}

.option-btn.wrong {
  background: #ef4444;
  border-color: #ef4444;
}

/* Result */
#result {
  font-size: 20px;
  font-weight: bold;
  min-height: 30px;
}

.stats {
  margin-top: 15px;
  padding-top: 15px;
  border-top: 1px solid rgba(255,255,255,0.1);
  color: #888;
  font-size: 13px;
}

/* Install button */
.install-btn {
  display: none;
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.install-btn.show {
  display: block;
}
</style>
</head>
<body>

<div class="header">
  <h2>HSK <span>Test</span> 📝</h2>
  <span class="offline-badge">📴 Offline</span>
  <a href="dashboard.html" class="btn-back">← Ortga</a>
</div>

<div class="container">
  
  <div class="controls">
    <div class="control-row">
      <label>Rejim:</label>
      <select id="mode">
        <option value="hanzi-pinyin">Hanzi → Pinyin</option>
        <option value="pinyin-hanzi">Pinyin → Hanzi</option>
        <option value="hanzi-english">Hanzi → English</option>
        <option value="english-hanzi">English → Hanzi</option>
      </select>
    </div>

    <div class="control-row">
      <label>Daraja:</label>
      <select id="level">
        <option value="all">HSK 1-6</option>
        <option value="1">HSK 1</option>
        <option value="2">HSK 2</option>
        <option value="3">HSK 3</option>
        <option value="4">HSK 4</option>
        <option value="5">HSK 5</option>
        <option value="6">HSK 6</option>
      </select>
    </div>

    <button class="btn-start" onclick="startTest()">🚀 Boshlash</button>
    <button id="installBtn" class="install-btn" onclick="installApp()">📲 Telefonga o'rnatish</button>
  </div>

  <div id="quiz">
    <div class="score-bar">
      <div class="score-item correct">✅ <span id="correctCount">0</span></div>
      <div class="score-item wrong">❌ <span id="wrongCount">0</span></div>
    </div>
    
    <h1 id="question"></h1>
    <div id="options"></div>
    <p id="result"></p>
    
    <div class="stats">
      <span id="totalWords">0</span> ta so'z yuklangan
    </div>
  </div>

</div>

<script>
let words = [];
let correctCount = 0;
let wrongCount = 0;
let deferredPrompt;

// Offline detection
window.addEventListener('online', () => document.body.classList.remove('offline'));
window.addEventListener('offline', () => document.body.classList.add('offline'));
if (!navigator.onLine) document.body.classList.add('offline');

// Install prompt
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').classList.add('show');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBtn').classList.remove('show');
    });
  }
}

function parseCSV(text) {
  return text.trim().split("\n").slice(1).map(r => {
    const c = r.split(",");
    return {
      hanzi: c[0]?.trim(),
      pinyin: c[1]?.trim(),
      english: c[2]?.trim()
    };
  }).filter(x => x.hanzi);
}

async function loadHSK(level) {
  words = [];

  if (level === "all") {
    for (let i = 1; i <= 6; i++) {
      try {
        const r = await fetch("hsk" + i + ".csv");
        const text = await r.text();
        words.push(...parseCSV(text));
      } catch (e) {}
    }
  } else {
    try {
      const r = await fetch("hsk" + level + ".csv");
      const text = await r.text();
      words = parseCSV(text);
    } catch (e) {}
  }

  document.getElementById("totalWords").textContent = words.length;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateQuestion() {
  const mode = document.getElementById("mode").value;
  const questionEl = document.getElementById("question");
  const optionsEl = document.getElementById("options");
  const resultEl = document.getElementById("result");

  resultEl.textContent = "";
  optionsEl.innerHTML = "";

  const correct = words[Math.floor(Math.random() * words.length)];
  let questionText, correctAnswer, getOption;

  switch (mode) {
    case "hanzi-pinyin":
      questionText = correct.hanzi;
      correctAnswer = correct.pinyin;
      getOption = w => w.pinyin;
      break;
    case "pinyin-hanzi":
      questionText = correct.pinyin;
      correctAnswer = correct.hanzi;
      getOption = w => w.hanzi;
      break;
    case "hanzi-english":
      questionText = correct.hanzi;
      correctAnswer = correct.english;
      getOption = w => w.english;
      break;
    case "english-hanzi":
      questionText = correct.english;
      correctAnswer = correct.hanzi;
      getOption = w => w.hanzi;
      break;
  }

  questionEl.textContent = questionText;

  let optionList = [correct];
  while (optionList.length < 4) {
    const random = words[Math.floor(Math.random() * words.length)];
    if (!optionList.find(o => getOption(o) === getOption(random))) {
      optionList.push(random);
    }
  }

  optionList = shuffle(optionList);

  optionList.forEach(w => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = getOption(w);

    btn.onclick = () => {
      const isCorrect = btn.textContent === correctAnswer;
      
      document.querySelectorAll(".option-btn").forEach(b => {
        b.style.pointerEvents = "none";
        if (b.textContent === correctAnswer) b.classList.add("correct");
      });

      if (isCorrect) {
        resultEl.textContent = "✅ To'g'ri!";
        resultEl.style.color = "#00ff88";
        correctCount++;
        document.getElementById("correctCount").textContent = correctCount;
      } else {
        btn.classList.add("wrong");
        resultEl.textContent = "❌ Javob: " + correctAnswer;
        resultEl.style.color = "#ff6b6b";
        wrongCount++;
        document.getElementById("wrongCount").textContent = wrongCount;
      }

      setTimeout(generateQuestion, 1200);
    };

    optionsEl.appendChild(btn);
  });
}

async function startTest() {
  const level = document.getElementById("level").value;
  
  correctCount = 0;
  wrongCount = 0;
  document.getElementById("correctCount").textContent = 0;
  document.getElementById("wrongCount").textContent = 0;
  
  await loadHSK(level);
  
  if (words.length === 0) {
    alert("So'zlar yuklanmadi!");
    return;
  }
  
  document.getElementById("quiz").classList.add("active");
  generateQuestion();
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
